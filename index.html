<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ivanrodriguez-cloud/AGEEMS-APP/main/icono.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ivanrodriguez-cloud/AGEEMS-APP/main/icono.png">
  
  <meta charset="utf-8">
  <title>SEMS - Gestión Estratégica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
  <script src="https://maps.googleapis.com/maps/api/js?v=3.exp&sensor=false"></script>

  <style>
    :root {
      --primary-orange: #FF8300;
      --primary-pink: #E5004E;
      --neutral-gray: #5B6670;
      --light-bg: #f8f9fa;
    }
    body { font-family: 'Poppins', sans-serif; background-color: var(--light-bg); color: var(--neutral-gray); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { background: #ffffff; width: 100%; max-width: 700px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 30px; }
    .header img { max-width: 150px; height: auto; }
    h1 { color: var(--primary-pink); font-size: 24px; font-weight: 600; text-align: center; margin-top: 10px; }
    .tablero-blanco { display: block; text-align: center; }
    .formulario-seccion { display: none; }
    .form-group { margin-bottom: 25px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #333; }
    input[type="text"], input[type="email"], input[type="datetime-local"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
    .btn { background-color: var(--primary-pink); color: white; padding: 12px 24px; border: none; border-radius: 6px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
    .btn-orange { background-color: var(--primary-orange); }
    
    /* Estilos de Tablas de Inventario */
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background-color: #f1f3f4; font-weight: 600; }
    .cant-input { width: 65px; padding: 6px; border-radius: 4px; border: 1px solid #ccc; text-align: center; font-family: 'Poppins', sans-serif; }
    
    /* Contenedor del mapa real de Google */
    #googleMapaCanvas { width: 100%; height: 320px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; }

    /* Alerta Estilizada */
    .modal-alerta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-contenido { background: white; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; width: 80%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="icono.png" alt="Logo SEMS">
    </div>

    <div id="tablero" class="tablero-blanco">
      <div style="height: 100px;"></div>
      <button class="btn btn-orange" onclick="mostrarFormulario()">Solicitud de Coffee Break</button>
    </div>

    <div id="formulario" class="formulario-seccion">
      <h1>Solicitud de Coffee Break</h1>
      <form id="coffeeForm" onsubmit="enviarFormulario(event)">
        <div class="form-group"><label>Nombre del evento *</label><input type="text" id="nombreEvento" required></div>
        <div class="form-group"><label>Nombre de quien solicita el servicio *</label><input type="text" id="nombre" required></div>
        <div class="form-group"><label>Correo de quien solicita el servicio *</label><input type="email" id="correo" required></div>
        <div class="form-group"><label>Fecha y Hora de Inicio del Evento *</label><input type="datetime-local" id="fechaInicio" required onchange="validarFechas()"></div>
        <div class="form-group"><label>Fecha y Hora de Fin del Evento *</label><input type="datetime-local" id="fechaFin" required></div>
        
        <div class="form-group">
          <label>Lugar del evento (Arrastra el marcador rojo de Google al sitio exacto) *</label>
          <div id="googleMapaCanvas"></div>
        </div>

        <div class="form-group">
          <label>Selecciona el Material Publicitario requerido:</label>
          <table id="tablaMateriales">
            <thead>
              <tr><th>Material</th><th>Disponibles</th><th>Cantidad Requerida</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="form-group">
          <label>Selecciona los Consumibles requeridos:</label>
          <table id="tablaConsumibles">
            <thead>
              <tr><th>Consumible</th><th>Disponibles</th><th>Cantidad Requerida</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="form-group">
          <label>Observaciones</label>
          <input type="text" id="observaciones" placeholder="Detalles adicionales, restricciones, etc.">
        </div>

        <button type="submit" class="btn" id="btnEnviar">Enviar Solicitud</button>
      </form>
    </div>
  </div>

  <div id="miAlerta" class="modal-alerta"><div class="modal-contenido"><p id="mensajeAlerta">¡Solicitud registrada con éxito!</p><button class="btn" style="width: auto; padding: 8px 30px;" onclick="cerrarAlerta()">Aceptar</button></div></div>

  <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyNI_kFk7ysB-qpcdF2j0UeFTMYJFH0-SzpZek4YGALAAwnzbyB6Bd4vjJVzLd4rUzGjA/exec";

    let map, marker;
    // Guadalajara Centro por defecto
    let miLatitud = 20.6767;
    let miLongitud = -103.3475;
    let coordenadasActuales = "https://maps.google.com/maps?q=$4";

    window.onload = function() {
      var inicioInput = document.getElementById('fechaInicio');
      var finInput = document.getElementById('fechaFin');
      var ahora = new Date();
      ahora.setHours(ahora.getHours() + 48);
      inicioInput.min = ahora.toISOString().slice(0, 16);
      finInput.min = estaba = ahora.toISOString().slice(0, 16);
      
      inicializarGoogleMap();
    };

    function validarFechas() {
      document.getElementById('fechaFin').min = document.getElementById('fechaInicio').value;
    }

    // Inicializa el mapa nativo con controles de Google
    function inicializarGoogleMap() {
      const opcionesMapa = {
        zoom: 13,
        center: new google.maps.LatLng(miLatitud, miLongitud),
        mapTypeId: google.maps.MapTypeId.ROADMAP
      };
      
      map = new google.maps.Map(document.getElementById('googleMapaCanvas'), opcionesMapa);

      // Crear marcador clásico rojo de Google Maps Arrastrable
      marker = new google.maps.Marker({
        position: new google.maps.LatLng(miLatitud, miLongitud),
        map: map,
        draggable: true
      });

      // Evento clave: detecta cuando terminas de mover el pin en Google Maps
      google.maps.event.addListener(marker, 'dragend', function() {
        const posicion = marker.getPosition();
        actualizarUbicacionFinal(posicion.lat(), posicion.lng());
      });

      // Intentar centrar en el GPS real del usuario al abrir la app
      obtenerGPS();
    }

    function actualizarUbicacionFinal(lat, lng) {
      miLatitud = lat;
      miLongitud = lng;
      // Genera la URL exacta para tu Google Sheets
      coordenadasActuales = `https://maps.google.com/maps?q=$5{lat.toFixed(6)},${lng.toFixed(6)}`;
    }

    function obtenerGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const nuevoPunto = new google.maps.LatLng(lat, lon);
          
          map.setCenter(nuevoPunto);
          map.setZoom(16);
          marker.setPosition(nuevoPunto);
          actualizarUbicacionFinal(lat, lon);
        });
      }
    }

    function mostrarFormulario() {
      document.getElementById('tablero').style.display = 'none';
      document.getElementById('formulario').style.display = 'block';
      
      // Forzar al mapa de Google a recalcular su tamaño al abrir la vista
      setTimeout(() => {
        google.maps.event.trigger(map, 'resize');
        map.setCenter(marker.getPosition());
      }, 300);

      fetch(`${URL_SCRIPT}?pestana=Material+publicitario&v=${Date.now()}`)
        .then(res => res.json()).then(data => construirTabla(data, 'tablaMateriales', 'mat-item'));
      
      fetch(`${URL_SCRIPT}?pestana=Consumibles&v=${Date.now()}`)
        .then(res => res.json()).then(data => construirTabla(data, 'tablaConsumibles', 'cons-item'));
    }

    function construirTabla(data, idTabla, clase) {
      var tbody = document.querySelector(`#${idTabla} tbody`);
      tbody.innerHTML = '';
      data.forEach(item => {
        tbody.innerHTML += `<tr>
          <td>${item.nombre}</td>
          <td><strong>${item.disponible}</strong></td>
          <td><input type="number" class="cant-input ${clase}" data-nombre="${item.nombre}" min="0" max="${item.disponible}" value="0"></td>
        </tr>`;
      });
    }

    function enviarFormulario(e) {
      e.preventDefault();
      document.getElementById('btnEnviar').disabled = true;
      document.getElementById('btnEnviar').innerText = "Enviando...";

      var materiales = [];
      document.querySelectorAll('.mat-item').forEach(input => { if(parseInt(input.value) > 0) materiales.push({ nombre: input.dataset.nombre, cantidad: input.value }); });

      var consumibles = [];
      document.querySelectorAll('.cons-item').forEach(input => { if(parseInt(input.value) > 0) consumibles.push({ nombre: input.dataset.nombre, cantidad: input.value }); });

      var datos = {
        nombreEvento: document.getElementById('nombreEvento').value,
        nombre: document.getElementById('nombre').value,
        correo: document.getElementById('correo').value,
        fechaInicio: document.getElementById('fechaInicio').value,
        fechaFin: document.getElementById('fechaFin').value,
        lugar: coordenadasActuales, // Envía las coordenadas del pin movido
        materiales: materiales,
        consumibles: consumibles,
        observaciones: document.getElementById('observaciones').value
      };

      fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
          document.getElementById('mensajeAlerta').innerText = "¡Solicitud registrada con éxito!";
          document.getElementById('miAlerta').style.display = 'flex';
          document.getElementById('coffeeForm').reset();
          document.getElementById('formulario').style.display = 'none';
          document.getElementById('tablero').style.display = 'block';
          document.getElementById('btnEnviar').disabled = false;
          document.getElementById('btnEnviar').innerText = "Enviar Solicitud";
        }).catch(err => {
          alert("Error en el envío: " + err);
          document.getElementById('btnEnviar').disabled = false;
          document.getElementById('btnEnviar').innerText = "Enviar Solicitud";
        });
    }

    function cerrarAlerta() { document.getElementById('miAlerta').style.display = 'none'; }
  </script>
</body>
</html>
